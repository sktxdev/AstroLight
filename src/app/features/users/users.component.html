<div class="users-container">
  <h2>{{ title }} Management</h2>

  <div class="users-grid">
      <table class="users-table">
          <thead>
              <tr>
                  <th>User ID</th>
                  <th>Username</th>
                  <th>First Name</th>
                  <th>Last Name</th>
                  <th>Description</th>
              </tr>
          </thead>
          <tbody>
              <tr *ngFor="let user of users" class="user-row">
                  <td class="user-id">{{ user.userId }}</td>
                  <td class="user-username">{{ user.username }}</td>
                  <td class="user-firstname">{{ user.firstName }}</td>
                  <td class="user-lastname">{{ user.lastName }}</td>
                  <td class="user-description">{{ user.description }}</td>
              </tr>
          </tbody>
      </table>
  </div>
</div>
