<!-- Corrected kpi-panel.component.html -->
<div class="kpi-panel"
     [class.panel-positive]="data.trend?.isPositive"
     [class.panel-negative]="!data.trend?.isPositive">

  <div class="kpi-header">
    <h3 class="kpi-title">{{ data.title }}</h3>
    <span class="kpi-trend" *ngIf="data.trend">
      <span class="trend-icon" [class.up]="data.trend.isPositive" [class.down]="!data.trend.isPositive">
        {{ data.trend.isPositive ? '↑' : '↓' }}
      </span>
      <!-- Just display the value directly as it is already a positive magnitude -->
      <span class="trend-value">{{ data.trend.value }}%</span>
    </span>
  </div>

  <!-- ... rest of the template ... -->
</div>
