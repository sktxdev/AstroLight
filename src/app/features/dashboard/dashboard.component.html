<!-- src/app/features/dashboard/dashboard.component.html -->
<div class="dashboard-container">
  <h2 class="dashboard-title">My Images</h2>

  <section class="image-upload-section">
    <div class="image-upload-card">
      <div class="upload-field">
        <label for="dashboard-image">Open New Image file</label>
        <input
          id="dashboard-image"
          type="file"
          accept="image/*"
          (change)="onImageSelected($event)">
      </div>

      <div class="upload-field">
        <label for="dashboard-image-description">Description</label>
        <textarea
          id="dashboard-image-description"
          rows="3"
          maxlength="500"
          [(ngModel)]="imageDescription"
          placeholder="Add a short description for this image"></textarea>
      </div>

      <div class="upload-preview" *ngIf="selectedImagePreview">
        <img [src]="selectedImagePreview" [alt]="selectedFileName || 'Selected file preview'">
        <div class="upload-preview__meta">
          <strong>{{ selectedFileName }}</strong>
          <span>{{ selectedFileType }}</span>
          <span>{{ formatFileSize(selectedFileSize) }}</span>
        </div>
      </div>

      <p class="upload-error" *ngIf="uploadError">{{ uploadError }}</p>

      <button
        type="button"
        class="upload-button"
        [disabled]="!selectedFile || isSavingImage"
        (click)="saveImage()">
        {{ isSavingImage ? 'Saving...' : 'Save image' }}
      </button>
    </div>

    <div class="image-library-card">
      <div class="image-library-header">
        <h3>My Image Library</h3>
        <p>Saved in IndexedDB database <strong>astrolight</strong> with filename as the key.</p>
      </div>

      <div class="image-library-grid" *ngIf="storedImages$ | async as storedImages">
        <p class="image-library-empty" *ngIf="storedImages.length === 0">
          No images stored yet.
        </p>

        <article
          class="image-thumb"
          *ngFor="let storedEntry of storedImages"
          [attr.title]="'Type: ' + storedEntry.fileType + ' | Size: ' + formatFileSize(storedEntry.fileSize) + ' | Date: ' + (storedEntry.uploadedAt | date:'medium') + (storedEntry.description ? ' | ' + storedEntry.description : '')">
          <img [src]="storedEntry.dataUrl" [alt]="storedEntry.description || storedEntry.filename">
          <p>{{ storedEntry.filename }}</p>
        </article>
      </div>
    </div>
  </section>

</div>
